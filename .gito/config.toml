# Gito project configuration
# Reference: https://github.com/Nayjest/Gito#-configuration

# Files to provide as additional context to the model (optional)
aux_files = []

# Exclude large / generated / noisy files from review context
exclude_files = [
  "package-lock.json",
  "pnpm-lock.yaml",
  "yarn.lock",
  "**/*.lock",
  "node_modules/**",
  ".next/**",
  "dist/**",
  "build/**",
  "coverage/**",
  "**/*.min.*",
  "**/*.map",
]

